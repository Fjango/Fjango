site_name: 'Fjango'
site_url: https://fjango.github.io/
site_author: Fjango
site_description: '经验分享平台 - 分享与发现成长路上的每一步'

# 导航栏
nav:
  - 首页: index.md
  - 投稿指南: contribute-guide.md

theme:
  name: material
  language: zh
  palette:
    # 浅色模式
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到深色模式
    # 深色模式
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到浅色模式

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy

  font:
    text: 'Noto Sans SC'
    code: 'JetBrains Mono'

  icon:
    logo: material/notebook-outline

# 自定义样式
extra_css:
  - stylesheets/extra.css

# 扩展
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - toc:
      permalink: true

# 插件
plugins:
  - search:
      lang: zh
      separator: '[\s\-,:!?。，、：；！？\(\)\[\]{}<>《》""''…\.\/]+'
      min_search_length: 1

